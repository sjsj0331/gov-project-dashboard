name: 대시보드 자동 업데이트

on:
  schedule:
    - cron: '0 0 * * 1-5'   # 09:00 KST (UTC 0:00), 월~금
    - cron: '0 9 * * 1-5'   # 18:00 KST (UTC 9:00), 월~금
  workflow_dispatch:          # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests beautifulsoup4 lxml

      - name: 공고 업데이트 실행
        run: python scripts/update_dashboard.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet index.html && echo "변경사항 없음, 스킵" && exit 0
          git add index.html
          git commit -m "Auto-update: $(TZ=Asia/Seoul date +%Y-%m-%d)"
          git push
